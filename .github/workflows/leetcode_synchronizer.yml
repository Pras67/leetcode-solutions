name: LeetCode Synchronizer

on:
  workflow_dispatch: # Allows you to trigger this manually whenever you want
  schedule:
    - cron: '0 0 * * *' # This will also run automatically every night at midnight!

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Run LeetCode Synchronizer
        uses: dos-m0nk3y/LeetCode-Synchronizer@v1.1.0
        with:
          GITHUB_TOKEN: ${{ github.token }}
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
          LEETCODE_CSRF_TOKEN: ${{ secrets.LEETCODE_CSRF_TOKEN }}
